<style>
/* =========================================
   1. PROMĚNNÉ A HLAVNÍ KONTEJNER
   ========================================= */
.hp-wrap {
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(1px);
  
  /* Tvé původní proměnné */
  --bg: #0f1723;
  --surface: rgba(26, 37, 51, 0.72);
  --border: #3f5670;
  --text: #d9e3ef;
  --accent: #7aa2d6;
  --gold: #d8b85d;
  --shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
  --shadow-inset: inset 0 0 12px rgba(0, 0, 0, 0.35);

  background: linear-gradient(135deg, rgba(41, 58, 85, 0.9) 0%, rgba(36, 66, 108, 0.8) 50%, rgba(14, 41, 79, 0.9) 100%); 
  color: var(--text); 
  font-family: 'Montserrat', sans-serif; 
  text-align: center; 
  padding: 20px;
  border-radius: 16px; 
  max-width: 420px; 
  margin: auto; 
  border: 2px solid var(--accent); 
  box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(142,154,175,0.2); 
}

/* Ochrana kontextu z-indexu */
.hp-wrap > * {
  position: relative;
  z-index: 1;
}

/* =========================================
   2. SCROLLOVÁNÍ A STRÁNKY
   ========================================= */
#hp-game-view, #hp-door-view, #hp-form-view, #hp-chest-view, 
#hp-statue-view, #hp-quidditch-view, #hp-gallery-view, #hp-flag-view {
  height: 700px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.hp-f-list, .hp-grid, #hp-db-rows, #hp-gallery-list, 
#hp-tab-potions, #hp-tab-artifacts {
  overflow-y: auto !important;
  flex-grow: 1;
  padding-right: 5px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(15, 23, 35, 0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; border: 1px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* =========================================
   3. TYPOGRAFIE A POMOCNÉ TŘÍDY
   ========================================= */
.hp-wrap h1, .hp-wrap h2 { 
  font-family: 'Great Vibes', cursive; color: var(--text); font-size: 38px; 
  letter-spacing: 1px; font-weight: normal; margin: 0 0 20px 0;
  text-shadow: 0 0 12px rgba(122,162,214,0.35), 0 2px 6px rgba(0,0,0,0.5);
} 
.hp-wrap p { font-size: 15px; line-height: 1.6; color: var(--text); } 
.hp-subtext { font-size: 11px; color: #aebbc8; display: block; margin-top: 2px; } 

.hp-hidden { display: none !important; } 

/* Oprava: Samostatné zvětšení přes scale u univerzálních klikatelných prvků */
.hp-clickable { cursor: pointer; transition: scale 0.3s ease, color 0.3s ease; } 
.hp-clickable:hover { scale: 1.03; color: var(--text); } 
area { cursor: pointer; }

.fiot { color: var(--gold); text-decoration: none; font-weight: bold; transition: color 0.2s; }
.fiot:hover { color: var(--text); text-decoration: underline; }

/* =========================================
   4. HLAVNÍ KOMPONENTY (Karty, Bary, Obrázky)
   ========================================= */
.hp-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: var(--shadow);
}

.hp-top-bar { 
  display: flex; justify-content: space-around; align-items: center; 
  background: var(--surface); padding: 12px; border-radius: 12px; 
  border: 1px solid var(--border); margin-bottom: 25px; 
  box-shadow: 0 6px 18px rgba(0,0,0,0.35), 0 0 12px rgba(122,162,214,0.08);
  animation: hp-glow 6s ease-in-out infinite; 
} 
.hp-stat { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; color: var(--text); } 
.hp-stat img { width: 40px; height: 40px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); } 

.hp-room-img { 
  width: 400px; 
  height: 600px; 
  display: block; 
  margin: 15px auto; 
  
  /* Zaoblení rohů */
  border-radius: 16px; 
  
  /* 1. Lehký rámeček (decentní linka) */
  border: 2px solid rgba(var(--accent-rgb), 0.2); 
  
  /* 2. Glow (barevná záře) + 3. Stín (hloubka) */
  box-shadow: 
    0 0 15px rgba(var(--accent-rgb), 0.15),
    0 10px 25px rgba(0, 0, 0, 0.1);
}

.hp-action-box {
  margin: 15px auto 5px auto; padding: 12px; background: rgba(22, 34, 47, 0.8);
  border: 1px solid var(--border); border-radius: 8px; font-size: 13px; 
  color: var(--text); box-shadow: 0 6px 18px rgba(0,0,0,0.35), 0 0 12px rgba(122,162,214,0.08); 
  text-align: center; border-left: 4px solid var(--accent); width: 390px; box-sizing: border-box;
}
.hp-action-box img { max-width: 100%; height: auto; border-radius: 4px; }

/* Oprava dveří: Přechod pouze pro scale a jas, odděleno od animace posunu */
.hp-wrap #hp-door-view img.hp-door { 
  width: 160px; border-radius: 50%; cursor: pointer; border: 4px double var(--accent); 
  box-shadow: 0 5px 15px rgba(0,0,0,0.6); 
  transition: scale 0.3s ease, filter 0.3s ease; 
  margin: 15px auto; display: block; animation: hp-float 4s ease-in-out infinite;
} 
.hp-wrap img.hp-door:hover { scale: 1.05; filter: brightness(1.15); } 

/* =========================================
   5. FORMULÁŘE (Inputy, Tlačítka, Taby)
   ========================================= */
.hp-form-box { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-top: 15px; } 

.hp-wrap input { 
  padding: 12px; text-align: center; background: var(--bg); color: var(--text); 
  border: 1px solid var(--border); border-radius: 12px; width: 80%; 
  margin-bottom: 12px; font-family: 'Montserrat', sans-serif; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); 
} 
.hp-wrap input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 8px rgba(142,154,175,0.4); } 

.hp-wrap button { 
  padding: 12px 24px; background: #24364d; border: 1px solid var(--accent); 
  cursor: pointer; font-weight: bold; border-radius: 12px; color: var(--text); 
  font-family: 'Montserrat', sans-serif; font-size: 14px; box-shadow: 0 3px 6px rgba(0,0,0,0.4); 
  transition: all 0.2s; 
} 
/* Oprava tlačítek: Odstraněno uskakování (transform), ponechán pouze vizuální stín */
.hp-wrap button:hover { 
  background: #2f4763; 
  box-shadow: 0 8px 22px rgba(0,0,0,0.4), 0 0 16px rgba(122,162,214,0.15); 
} 
.hp-back-btn { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; margin-top: 15px; }

.hp-tabs { display: flex; gap: 5px; justify-content: center; margin-bottom: 15px; } 
.hp-tab-b { 
  background: var(--surface); border: 1px solid var(--border); color: #aebbc8; 
  padding: 8px 12px; cursor: pointer; border-radius: 4px; font-family: 'Montserrat', sans-serif; 
  font-weight: bold; font-size: 12px; 
} 
.hp-tab-b.active { background: var(--border); color: var(--text); border-color: var(--accent); } 

/* =========================================
   6. SEZNAMY, GRIDY, POLOŽKY A PROFILY
   ========================================= */
/* Oprava hover bloků: Místo konfliktního transform používáme čistý scale */
.hp-grid-item, .hp-potion-item, .hp-f-item, .hp-student-profile {
  background: var(--surface); border: 1px solid var(--border); 
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35), 0 0 12px rgba(122,162,214,0.08);
  transition: scale 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background-color 0.2s ease;
}
.hp-grid-item:hover, .hp-potion-item:hover, .hp-f-item:hover, .hp-student-profile:hover {
  scale: 1.03; 
  border-color: var(--accent);
  box-shadow: 0 8px 22px rgba(0,0,0,0.4), 0 0 16px rgba(122,162,214,0.15);
}

.hp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 350px; overflow-y: auto; padding: 5px; } 
.hp-grid-item { padding: 8px; font-size: 11px; cursor: pointer; position: relative; } 
.hp-grid-item img { height: 45px; object-fit: contain; margin-bottom: 4px; display: block; margin-left: auto; margin-right: auto; } 

.hp-spell-name { color: var(--gold); font-weight: bold; display: block; margin-top: 2px; font-family: monospace; } 

.hp-potion-section-title { font-size: 14px; color: var(--text); text-align: left; margin: 15px 0 8px 5px; font-weight: bold; border-left: 3px solid var(--accent); padding-left: 8px; } 
.hp-potion-item { padding: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px; text-align: left; } 
.hp-potion-item:hover { background: #22314d; }
.hp-potion-img { width: 48px; height: 48px; object-fit: contain; } 

.hp-artifact-img { width: 50px; height: 50px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); }

.hp-f-list { text-align: left; max-height: 650px; overflow-y: auto; } 
.hp-f-item { padding: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 15px; } 

.hp-student-profile { padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
.hp-student-portrait { width: 130px; height: 130px; object-fit: cover; border-radius: 50%; border: 3px solid var(--accent); background: var(--bg); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
.hp-student-name { color: var(--gold); font-size: 16px; font-weight: 700; margin: 0 0 5px 0; letter-spacing: 0.5px; }
.hp-student-info { font-size: 12px; color: var(--text); line-height: 1.5; margin: 0; }

/* =========================================
   7. TABULKY A SPECIFICKÉ BOXY
   ========================================= */
.hp-db-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; background: var(--bg); color: var(--text); } 
.hp-db-table th, .hp-db-table td { border: 1px solid var(--border); padding: 8px; text-align: left; } 
.hp-db-table td code { color: var(--gold); background: rgba(255, 255, 255, 0.1); padding: 2px 4px; border-radius: 3px; }
.hp-db-table th { background: var(--surface); color: var(--text); font-family: 'Montserrat', sans-serif; font-weight: 700; } 
/* Oprava zväčšení u obrázků v tabulce */
.hp-db-table img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; transition: scale 0.2s ease; } 
.hp-db-table img:hover { scale: 1.1; border-color: var(--gold); }

.hp-trezor-box { margin-top: 25px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; box-shadow: 0 6px 18px rgba(0,0,0,0.35), 0 0 12px rgba(122,162,214,0.08); animation: hp-glow 6s ease-in-out infinite; }
.hp-trezor-header { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; }
.hp-trezor-header img { width: 24px; height: 24px; object-fit: contain; }
.hp-trezor-header h3 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 16px; color: var(--text); letter-spacing: 0.5px; }
.hp-trezor-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.hp-trezor-table th { color: #aebbc8; border-bottom: 2px solid var(--border); padding: 6px 4px; font-weight: bold; }
.hp-trezor-table td { padding: 8px 4px; border-bottom: 1px solid #233143; color: var(--text); }

#hp-copy-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--accent); color: var(--gold); padding: 10px 20px; border-radius: 16px; font-size: 12px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 9999; display: none; }

/* Filtry */
.hp-tint-neg { filter: sepia(1) hue-rotate(-50deg) saturate(3) brightness(0.9); } 
.hp-tint-pos { filter: sepia(1) hue-rotate(70deg) saturate(3) brightness(0.9); } 
.hp-tint-neu { filter: sepia(1) hue-rotate(15deg) saturate(3) brightness(1); } 

/* =========================================
   8. ANIMACE
   ========================================= */
/* Oprava plynulosti animací pomocí vlastnosti translate místo transform */
@keyframes hp-stars {
  from { opacity: .35; translate: 0 0px; }
  to { opacity: .8; translate: 0 -4px; }
}

@keyframes hp-glow {
  0%,100% { box-shadow: 0 2px 3px rgba(0,0,0,.35), 0 0 12px rgba(122,162,214,.08); }
  50% { box-shadow: 0 2px 3px rgba(0,0,0,.35), 0 0 3px rgba(122,162,214,.18); }
}

@keyframes hp-float {
  0%,100% { translate: 0 0; }
  50% { translate: 0 -6px; }
}
</style>
